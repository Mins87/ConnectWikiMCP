<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectWiki Intelligence</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/static/force-graph.min.js?v=2026.4.13.11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03060a;
            --accent-color: #58a6ff;
            --panel-bg: rgba(13, 17, 23, 0.75);
            --border-color: rgba(88, 166, 255, 0.2);
            --text-main: #fff;
            --text-dim: #8b949e;
        }

        body { 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        #graph { 
            width: 100vw; 
            height: 100vh; 
            opacity: 0; 
            transition: opacity 1.5s ease; 
        }

        .header {
            position: absolute;
            top: 25px;
            left: 40px;
            z-index: 100;
            pointer-events: none;
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 600; 
            color: var(--text-main); 
            letter-spacing: -0.03em;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5); 
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: var(--panel-bg);
            padding: 20px 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .stats { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: var(--accent-color);
            background: rgba(3,6,10,0.95);
            padding: 24px 48px;
            border-radius: 60px;
            border: 1px solid rgba(88, 166, 255, 0.3);
            box-shadow: 0 0 50px rgba(88, 166, 255, 0.2);
            transition: opacity 0.8s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(88, 166, 255, 0.2);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div> 신경망 동기화 중...</div>
    <div class="header"><h1>ConnectWiki Intelligence <small style="font-size: 12px; vertical-align: middle; opacity: 0.5;">v2.0.1</small></h1></div>
    <div class="controls">
        <div class="stats">신경 노드: <b>{{node_count}}</b> &nbsp;•&nbsp; 연결망: <b>{{link_count}}</b></div>
    </div>
    <div id="graph"></div>

    <script>
        const gData = {json_data};
        const elem = document.getElementById('graph');
        const loading = document.getElementById('loading');
        
        function revealGraph() {
            if (loading.style.display !== 'none') {
                loading.style.opacity = '0';
                elem.style.opacity = '1';
                setTimeout(() => loading.style.display = 'none', 800);
            }
        }

        if (typeof ForceGraph === 'undefined') {
            loading.innerHTML = '<span style="color:#ff7b72">오류: 시스템 정적 자원을 불러올 수 없습니다.</span>';
        } else {
            const Graph = ForceGraph()(elem)
                .graphData(gData)
                .nodeId('id')
                .nodeAutoColorBy(node => node.id.split('/')[0])
                .nodeCanvasObject((node, ctx, globalScale) => {
                    const isFolder = node.type === 'folder';
                    
                    // Clean label: get last part of path, remove trailing slash, replace _ with space
                    const parts = node.id.split('/').filter(p => p.length > 0);
                    const rawLabel = (parts[parts.length - 1] || node.id).replace(/_/g, ' ');
                    const label = isFolder ? rawLabel.toUpperCase() : rawLabel;
                    
                    // Folder nodes are bigger anchors (6px-12px range)
                    // Page nodes are tiny refined points (3px-6px range)
                    const baseSize = isFolder 
                        ? (6 + Math.min(6, (node.val - 2) * 0.2))
                        : (3 + Math.min(3, (node.val - 1) * 0.1));
                        
                    const fontSize = (isFolder ? 14 : 12) / globalScale;
                    ctx.font = `${isFolder ? 'bold' : 'normal'} ${fontSize}px Inter`;
                    
                    // Style Folder vs Page
                    if (isFolder) {
                        // Soft glowing aura for folders - base glow + connectivity
                        const glowIntensity = 10 + Math.min(25, node.val * 1.5);
                        ctx.shadowBlur = glowIntensity / globalScale;
                        ctx.shadowColor = node.color;
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, baseSize, 0, 2 * Math.PI, false);
                        ctx.fillStyle = node.color;
                        ctx.globalAlpha = 0.85;
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    } else {
                        // Sharp point for pages - glow only for connected ones
                        const glowIntensity = node.val > 2 ? Math.min(20, node.val * 2) : 0;
                        ctx.shadowBlur = glowIntensity / globalScale;
                        ctx.shadowColor = node.color;
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, baseSize, 0, 2 * Math.PI, false);
                        ctx.fillStyle = node.color;
                        ctx.fill();
                    }
                    
                    ctx.shadowBlur = 0;
                    // Labels: Folders always show if not too zoomed out, Pages only when close
                    const showLabel = isFolder ? (globalScale > 0.3) : (globalScale > 1.2);
                    if (showLabel) {
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = isFolder ? node.color : '#fff';
                        if (isFolder) {
                            // Folders have a background for legibility
                            const textWidth = ctx.measureText(label).width;
                            ctx.fillStyle = 'rgba(3,6,10,0.8)';
                            ctx.fillRect(node.x - textWidth/2 - 2, node.y + baseSize + 2, textWidth + 4, fontSize + 2);
                            ctx.fillStyle = node.color;
                        } else {
                            ctx.fillStyle = '#fff';
                        }
                        ctx.fillText(label, node.x, node.y + baseSize + (fontSize * 1.5));
                    }
                })
                .linkDirectionalParticles(link => link.type === 'wiki' ? 3 : 2)
                .linkDirectionalParticleWidth(1.5)
                .linkDirectionalParticleSpeed(link => link.type === 'hierarchical' ? 0.005 : 0.01)
                .linkDirectionalArrowLength(4)
                .linkDirectionalArrowRelPos(1) // Arrows at the end of the link
                .linkCurvature(0.2)
                .linkWidth(link => link.type === 'hierarchical' ? 1.5 : 0.5)
                .linkColor(link => link.type === 'hierarchical' ? 'rgba(255, 255, 255, 0.15)' : 'rgba(255, 255, 255, 0.08)')
                .backgroundColor('#03060a')
                .onNodeDragEnd(node => {
                  // Pin node at its dropped position
                  node.fx = node.x;
                  node.fy = node.y;
                })
                .onNodeClick(node => {
                  // Release pinned node on click
                  node.fx = null;
                  node.fy = null;
                })
                .onEngineTick(() => {
                    revealGraph();
                });

            // Physics tuning - Balanced: Floaty but anchored to center
            Graph.d3Force('link').distance(link => link.type === 'hierarchical' ? 50 : 120);
            Graph.d3Force('charge').strength(-150);
            Graph.d3Force('center').strength(0.15); // Restored anchored center
            Graph.d3Force('radial', d3.forceRadial(0).strength(0.05)); // Gentle radial pull
            
            const collide = Graph.d3Force('collide');
            if (collide && typeof collide.radius === 'function') {
                collide.radius(node => Math.min(12, (6 + node.val * 0.4)) * 1.1);
            }
            
            Graph.d3AlphaDecay(0.01); // Standard settling speed
            Graph.d3VelocityDecay(0.2); // Balanced friction

            setTimeout(revealGraph, 1200);

            window.addEventListener('resize', () => {
                Graph.width(window.innerWidth).height(window.innerHeight);
            });
        }
    </script>
</body>
</html>
